name: Spring Boot CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Give Gradle permission
      - name: Grant execute permission
        run: chmod +x gradlew

      # Build project
      - name: Build Project
        run: ./gradlew clean build -x test

      # Copy only the jar to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/demo-0.0.1-SNAPSHOT.jar"
          target: "/opt/cicd"
          strip_components: 2

      # Restart application
      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/cicd

            echo "Current Directory:"
            pwd

            echo "Files:"
            ls -lh

            # Match only the Java process; [j]ava avoids matching this script
            PID=$(ps -ef | grep '[j]ava -jar .*demo-0.0.1-SNAPSHOT.jar' | awk '{print $2}' || true)

            if [ -n "$PID" ]; then
              echo "Stopping existing application (PID=$PID)"
              kill -15 $PID || true
              sleep 5
              # Force kill if still running
              for p in $PID; do
                if kill -0 "$p" 2>/dev/null; then
                  echo "Force killing PID=$p"
                  kill -9 "$p" || true
                fi
              done
            else
              echo "No existing application found."
            fi

            echo "Starting application..."
            nohup java -jar /opt/cicd/demo-0.0.1-SNAPSHOT.jar > /opt/cicd/app.log 2>&1 < /dev/null &
            disown || true

            sleep 10

            PID=$(ps -ef | grep '[j]ava -jar .*demo-0.0.1-SNAPSHOT.jar' | awk '{print $2}' || true)

            if [ -n "$PID" ]; then
              echo "Application started successfully."
              echo "Running PID: $PID"
              exit 0
            else
              echo "Application failed to start."
              echo "========== APP LOG =========="
              cat /opt/cicd/app.log || true
              exit 1
            fi
